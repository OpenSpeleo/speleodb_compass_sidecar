name: "CI Tests"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  pre-commit:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: cargo-bins/cargo-binstall@main

      - name: Install prek
        run: cargo binstall prek

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: ubuntu-pre-commit

      - name: Run pre-commit hooks
        run: prek run -a

  test:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            args: ""
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"

    runs-on: ${{ matrix.platform }}

    needs: [pre-commit]

    steps:
      - uses: actions/checkout@v6

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: cargo-bins/cargo-binstall@main

      - name: Install trunk and wasm-pack
        run: cargo binstall trunk wasm-pack

      # Cache Rust dependencies and build artifacts
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: ${{ matrix.platform }}-test

      # Cache Trunk frontend build artifacts
      - name: Cache Trunk build
        uses: actions/cache@v5
        with:
          path: |
            dist
            target/wasm32-unknown-unknown
          key: ${{ runner.os }}-trunk-test-${{ hashFiles('src/**', 'Cargo.lock', 'index.html', 'styles.css') }}
          restore-keys: |
            ${{ runner.os }}-trunk-test-

      - name: Setup test environment
        run: |
          echo "TEST_SPELEODB_INSTANCE=${{ secrets.TEST_SPELEODB_INSTANCE || 'https://www.speleoDB.org' }}" >> $GITHUB_ENV
          echo "TEST_SPELEODB_OAUTH=${{ secrets.TEST_SPELEODB_OAUTH || '0123456789abcdef0123456789abcdef01234567' }}" >> $GITHUB_ENV
        shell: bash

      - name: Install make (Windows)
        if: matrix.platform == 'windows-latest'
        run: choco install make
        shell: powershell

      - name: Run tests
        run: make test
        shell: bash

  trigger-release:
    name: Trigger release
    needs: [test]
    if: github.event_name == 'push' && github.ref_type == 'branch'
    runs-on: ubuntu-22.04
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Fetch latest tags
        run: git fetch --tags --force

      - name: Dispatch release if commit is tagged
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(git tag --points-at HEAD --sort=-version:refname | grep '^v' | head -1)
          if [ -z "$TAG" ]; then
            echo "No v* tag on HEAD — skipping release"
            exit 0
          fi
          echo "Found tag $TAG — dispatching release workflow"
          gh workflow run release.yml --ref "$TAG"
